/**
 * Experiment 24: Predict missing "inhibits" relationships
 *
 * Positive: drugs WITH inhibits triples
 * Negative: drugs WITHOUT inhibits triples
 *
 * If DL-Learner finds "treats SOME WetAMD" as the pattern, it means
 * ALL WetAMD drugs SHOULD have inhibits triples — and any that don't
 * are MISSING data. This is KNOWLEDGE GRAPH COMPLETION.
 */
ks.type = "OWL File"
ks.fileName = "../AMD3.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

// Drugs that HAVE inhibits triples
lp.positiveExamples = {
    "http://example.org/amd#Ranibizumab",
    "http://example.org/amd#Bevacizumab",
    "http://example.org/amd#Aflibercept",
    "http://example.org/amd#Avastin",
    "http://example.org/amd#Pazopanib",
    "http://example.org/amd#OT-551",
    "http://example.org/amd#Lucentis",
    "http://example.org/amd#Eylea",
    "http://example.org/amd#Conbercept",
    "http://example.org/amd#Macuvite",
    "http://example.org/amd#Copaxone",
    "http://example.org/amd#Sirolimus",
    "http://example.org/amd#Sonepcizumab"
}

// Drugs that DON'T have inhibits triples (but maybe should?)
lp.negativeExamples = {
    "http://example.org/amd#Verteporfin",
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Saffron",
    "http://example.org/amd#Zinc",
    "http://example.org/amd#Copper",
    "http://example.org/amd#Vitrectomy",
    "http://example.org/amd#Photocoagulation",
    "http://example.org/amd#Rheopheresis",
    "http://example.org/amd#Acetazolamide",
    "http://example.org/amd#Phenylephrine",
    "http://example.org/amd#Perfluoropropane",
    "http://example.org/amd#Dexamethasone",
    "http://example.org/amd#SRT"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 20.0
