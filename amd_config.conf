/**
 * DL-Learner Configuration for AMD Ontology
 * This config file tells DL-Learner how to discover axioms from your AMD.owl
 */

// Import the AMD ontology
import("AMD.owl");

// Define the knowledge source (your OWL file)
ks.type = "OWL File"
ks.fileName = "AMD.owl"

// Define the reasoning service
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

// Learning problem: Class Learning
// This will find definitions for your AMD classes
lp.type = "ClassLearning"

// Choose which class to learn about
// Change this to learn different classes:
// Options: Disease, WetAMD, DryAMD, Treatment, Biomarker, etc.
lp.classToDescribe = "http://example.org/amd#WetAMD"

// Configure the learning algorithm
alg.type = "celoe"  // Class Expression Learning for Ontology Engineering
alg.maxExecutionTimeInSeconds = 60
alg.noisePercentage = 0.1
alg.maxNrOfResults = 10

// Heuristic settings
alg.writeSearchTree = false
alg.searchTreeFile = "search_tree.txt"

// Configure reasoner
reasoner.reasonerType = "hermit"  // Options: hermit, pellet, elk