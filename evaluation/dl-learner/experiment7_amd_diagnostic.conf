/**
 * Experiment 7: Which diagnostic methods are used for AMD?
 *
 * All examples are DiagnosticMethod instances — class label can't separate.
 * DL-Learner must find property patterns like "diagnosedBy SOME AMD".
 */

ks.type = "OWL File"
ks.fileName = "../AMD3.owl"

reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

lp.type = "posNegStandard"

// Diagnostic methods that diagnose AMD (from diagnosedBy triples)
lp.positiveExamples = {
    "http://example.org/amd#OCT",
    "http://example.org/amd#ETDRS",
    "http://example.org/amd#Angiography",
    "http://example.org/amd#Electroretinography",
    "http://example.org/amd#PAECT",
    "http://example.org/amd#CNIB",
    "http://example.org/amd#ERG"
}

// Diagnostic methods NOT linked to AMD diagnosis
lp.negativeExamples = {
    "http://example.org/amd#Maculometer",
    "http://example.org/amd#Refractometer",
    "http://example.org/amd#IReST",
    "http://example.org/amd#Pyrosequencing",
    "http://example.org/amd#MOS_SF-36",
    "http://example.org/amd#NEI_VFQ-25",
    "http://example.org/amd#ICG"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
