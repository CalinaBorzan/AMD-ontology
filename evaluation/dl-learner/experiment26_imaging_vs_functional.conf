/**
 * Experiment 26: Imaging vs functional diagnostics.
 *
 * All examples are DiagnosticMethod, so the class label cannot
 * separate them. DL-Learner must find a property-based pattern,
 * e.g. imaging methods are measuredBy at least one structural
 * Biomarker (drusen, lipofuscin, photoreceptor, ...) whereas
 * functional/questionnaire tests are not.
 */

ks.type = "OWL File"
ks.fileName = "../../../ontology/AMD_final_clean.owl"

reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

lp.type = "posNegStandard"

// Imaging-based diagnostics
lp.positiveExamples = {
    "http://example.org/amd#OCT",
    "http://example.org/amd#ICG",
    "http://example.org/amd#Ultrasound",
    "http://example.org/amd#Angiography",
    "http://example.org/amd#MAIA",
    "http://example.org/amd#PAECT",
    "http://example.org/amd#Maculometer"
}

// Functional / questionnaire / refraction-based diagnostics
lp.negativeExamples = {
    "http://example.org/amd#MOS_SF-36",
    "http://example.org/amd#NEI_VFQ-25",
    "http://example.org/amd#ETDRS",
    "http://example.org/amd#IReST",
    "http://example.org/amd#Refractometer",
    "http://example.org/amd#ERG",
    "http://example.org/amd#Electroretinography"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
