/**
 * DL-Learner Experiment 1: What defines an AntiVEGF drug?
 *
 * Goal: Learn a class expression that describes AntiVEGFTherapy instances.
 * Expected result: something like "Treatment AND inhibits SOME {VEGF}"
 *
 * This validates that the ontology captured the right relational structure
 * for anti-VEGF drugs.
 */

// Knowledge source — your OWL file
ks.type = "OWL File"
ks.fileName = "../AMD3.owl"

// Reasoner — closed world assumption (treats missing facts as false)
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

// Learning problem: positive = AntiVEGF drugs, negative = other treatments
lp.type = "posNegStandard"

lp.positiveExamples = {
    "http://example.org/amd#Ranibizumab",
    "http://example.org/amd#Aflibercept",
    "http://example.org/amd#Bevacizumab",
    "http://example.org/amd#Lucentis",
    "http://example.org/amd#Eylea",
    "http://example.org/amd#Conbercept",
    "http://example.org/amd#Avastin"
}

lp.negativeExamples = {
    "http://example.org/amd#Verteporfin",
    "http://example.org/amd#Celecoxib",
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Copaxone",
    "http://example.org/amd#Sirolimus",
    "http://example.org/amd#PDT",
    "http://example.org/amd#Vitrectomy",
    "http://example.org/amd#Dexamethasone",
    "http://example.org/amd#Photocoagulation"
}

// Learning algorithm — CELOE (Class Expression Learning for Ontology Engineering)
la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 10.0
