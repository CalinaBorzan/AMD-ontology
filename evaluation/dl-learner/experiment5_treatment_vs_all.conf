/**
 * DL-Learner Experiment 5: What defines a Treatment?
 *
 * Positive: all Treatment instances
 * Negative: instances from ALL other classes (genes, biomarkers, diagnostics)
 *
 * This should learn: "Treatment ≡ treats SOME Disease" — a property-based
 * definition, not just a class label.
 */

ks.type = "OWL File"
ks.fileName = "../AMD3.owl"

reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

lp.type = "posNegStandard"

// All Treatment instances (including AntiVEGFTherapy members)
lp.positiveExamples = {
    "http://example.org/amd#Ranibizumab",
    "http://example.org/amd#Aflibercept",
    "http://example.org/amd#Bevacizumab",
    "http://example.org/amd#Verteporfin",
    "http://example.org/amd#Celecoxib",
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Vitrectomy",
    "http://example.org/amd#Copaxone",
    "http://example.org/amd#Sirolimus",
    "http://example.org/amd#Macuvite",
    "http://example.org/amd#Lucentis",
    "http://example.org/amd#Eylea",
    "http://example.org/amd#Conbercept",
    "http://example.org/amd#Avastin",
    "http://example.org/amd#Photocoagulation",
    "http://example.org/amd#Rheopheresis"
}

// Non-treatment instances (genes, biomarkers, diagnostics, risk factors)
lp.negativeExamples = {
    "http://example.org/amd#CFH",
    "http://example.org/amd#ARMS2",
    "http://example.org/amd#HTRA1",
    "http://example.org/amd#VEGF",
    "http://example.org/amd#Drusen",
    "http://example.org/amd#OCT",
    "http://example.org/amd#ETDRS",
    "http://example.org/amd#Smoking",
    "http://example.org/amd#Glaucoma",
    "http://example.org/amd#Cataract",
    "http://example.org/amd#Lutein",
    "http://example.org/amd#rs11200638",
    "http://example.org/amd#Ultrasound",
    "http://example.org/amd#Inflammation",
    "http://example.org/amd#Lipofuscin"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 20.0
