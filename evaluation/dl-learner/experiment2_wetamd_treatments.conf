/**
 * DL-Learner Experiment 2: What distinguishes WetAMD treatments from DryAMD treatments?
 *
 * Goal: Learn what makes a WetAMD treatment different from a DryAMD treatment.
 * Expected insight: WetAMD treatments tend to inhibit VEGF or treat WetAMD specifically.
 *
 * This discovers medical patterns in the extracted data.
 */

// Knowledge source
ks.type = "OWL File"
ks.fileName = "../AMD3.owl"

// Reasoner
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

// Learning problem: positive = WetAMD treatments, negative = DryAMD/other treatments
lp.type = "posNegStandard"

// Drugs that treat WetAMD (from "treats WetAMD" triples)
lp.positiveExamples = {
    "http://example.org/amd#Ranibizumab",
    "http://example.org/amd#Aflibercept",
    "http://example.org/amd#Bevacizumab",
    "http://example.org/amd#Verteporfin",
    "http://example.org/amd#Lucentis",
    "http://example.org/amd#Eylea",
    "http://example.org/amd#Conbercept"
}

// Drugs that treat DryAMD or general AMD (not specifically WetAMD)
lp.negativeExamples = {
    "http://example.org/amd#Rheopheresis",
    "http://example.org/amd#Copaxone",
    "http://example.org/amd#Macuvite",
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Saffron",
    "http://example.org/amd#Zinc",
    "http://example.org/amd#OT-551",
    "http://example.org/amd#Sirolimus"
}

// Learning algorithm
la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
