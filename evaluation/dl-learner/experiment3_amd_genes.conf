/**
 * DL-Learner Experiment 3: What characterizes AMD-associated genes?
 *
 * Goal: Learn what distinguishes genes associated with AMD from those not associated.
 * Expected insight: AMD genes tend to have "associatedWith AMD" relationships.
 *
 * This validates the genetic biomarker extraction quality.
 */

// Knowledge source
ks.type = "OWL File"
ks.fileName = "../AMD3.owl"

// Reasoner
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

// Learning problem: positive = AMD-associated genes, negative = other genes
lp.type = "posNegStandard"

// Genes that have "associatedWith AMD" triples
lp.positiveExamples = {
    "http://example.org/amd#CFH",
    "http://example.org/amd#C3",
    "http://example.org/amd#C2",
    "http://example.org/amd#CFB",
    "http://example.org/amd#ARMS2",
    "http://example.org/amd#HTRA1",
    "http://example.org/amd#ApoE",
    "http://example.org/amd#CX3CR1",
    "http://example.org/amd#LOC387715",
    "http://example.org/amd#CFI",
    "http://example.org/amd#PLEKHA1",
    "http://example.org/amd#VEGFR"
}

// Genes without direct AMD association, or non-gene biomarkers
lp.negativeExamples = {
    "http://example.org/amd#TAS2R38",
    "http://example.org/amd#LOC",
    "http://example.org/amd#BF",
    "http://example.org/amd#VEGF",
    "http://example.org/amd#Lutein",
    "http://example.org/amd#Zeaxanthin",
    "http://example.org/amd#Drusen",
    "http://example.org/amd#Lipofuscin"
}

// Learning algorithm
la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 10.0
