/**
 * Experiment 12: Same as Exp 6 (VEGF inhibitors) but using ELTL algorithm
 * ELTL produces simpler axioms (EL++ logic only)
 */
ks.type = "OWL File"
ks.fileName = "../../../ontology/AMD_final_clean.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

lp.positiveExamples = {
    "http://example.org/amd#Ranibizumab",
    "http://example.org/amd#Bevacizumab",
    "http://example.org/amd#Aflibercept",
    "http://example.org/amd#Lucentis",
    "http://example.org/amd#Eylea",
    "http://example.org/amd#Conbercept",
    "http://example.org/amd#Avastin",
    "http://example.org/amd#Pazopanib",
    "http://example.org/amd#Macuvite",
    "http://example.org/amd#OT-551"
}

lp.negativeExamples = {
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Acetazolamide",
    "http://example.org/amd#Photocoagulation",
    "http://example.org/amd#Vitrectomy",
    "http://example.org/amd#Rheopheresis",
    "http://example.org/amd#Perfluoropropane",
    "http://example.org/amd#Phenylephrine",
    "http://example.org/amd#Zinc",
    "http://example.org/amd#Copper",
    "http://example.org/amd#Saffron"
}

la.type = "org.dllearner.algorithms.el.ELLearningAlgorithm"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
