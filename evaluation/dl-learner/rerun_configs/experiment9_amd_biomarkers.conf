/**
 * Experiment 9: Which biomarkers indicate AMD?
 * All examples are biomarkers — must find "indicates SOME Disease"
 */
ks.type = "OWL File"
ks.fileName = "../../ontology/AMD_final_clean.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

// Biomarkers that have "indicates" triples
lp.positiveExamples = {
    "http://example.org/amd#Drusen",
    "http://example.org/amd#Lutein",
    "http://example.org/amd#Zeaxanthin",
    "http://example.org/amd#Microglia",
    "http://example.org/amd#Lipofuscin"
}

// Biomarkers without "indicates" triples
lp.negativeExamples = {
    "http://example.org/amd#VEGF",
    "http://example.org/amd#Monocyte",
    "http://example.org/amd#CNTF",
    "http://example.org/amd#S1P",
    "http://example.org/amd#Carotenoids",
    "http://example.org/amd#rs11200638",
    "http://example.org/amd#rs1061170"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
