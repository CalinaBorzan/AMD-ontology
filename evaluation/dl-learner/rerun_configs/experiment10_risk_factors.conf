/**
 * Experiment 10: What characterizes AMD risk factors?
 * Positive = risk factors, Negative = biomarkers and genes
 * Should find "causesOrIncreases SOME Disease"
 */
ks.type = "OWL File"
ks.fileName = "../../ontology/AMD_final_clean.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

// Risk factors
lp.positiveExamples = {
    "http://example.org/amd#Smoking",
    "http://example.org/amd#Sunlight",
    "http://example.org/amd#Occupation",
    "http://example.org/amd#Hypoxia",
    "http://example.org/amd#Inflammation"
}

// Not risk factors — genes and biomarkers (also associated with disease but differently)
lp.negativeExamples = {
    "http://example.org/amd#CFH",
    "http://example.org/amd#ARMS2",
    "http://example.org/amd#HTRA1",
    "http://example.org/amd#Drusen",
    "http://example.org/amd#VEGF",
    "http://example.org/amd#Lutein",
    "http://example.org/amd#Lipofuscin",
    "http://example.org/amd#Aspirin",
    "http://example.org/amd#Ranibizumab"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
