/**
 * Experiment 25: Predict missing "associatedWith" relationships for genes
 *
 * Positive: genes WITH associatedWith AMD
 * Negative: genes WITHOUT
 *
 * The learned axiom tells us: what should ALL AMD genes have?
 * Genes in negative set that MATCH the pattern are candidates
 * for missing associatedWith triples.
 */
ks.type = "OWL File"
ks.fileName = "../../ontology/AMD_final_clean.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

// Genes with associatedWith AMD
lp.positiveExamples = {
    "http://example.org/amd#CFH",
    "http://example.org/amd#C3",
    "http://example.org/amd#C2",
    "http://example.org/amd#CFB",
    "http://example.org/amd#ARMS2",
    "http://example.org/amd#HTRA1",
    "http://example.org/amd#ApoE",
    "http://example.org/amd#CX3CR1",
    "http://example.org/amd#LOC387715",
    "http://example.org/amd#CFI",
    "http://example.org/amd#PLEKHA1",
    "http://example.org/amd#VEGFR"
}

// Genes and biomarkers WITHOUT associatedWith AMD
lp.negativeExamples = {
    "http://example.org/amd#BF",
    "http://example.org/amd#VEGF",
    "http://example.org/amd#Drusen",
    "http://example.org/amd#Lipofuscin",
    "http://example.org/amd#Monocyte",
    "http://example.org/amd#Microglia",
    "http://example.org/amd#S1P",
    "http://example.org/amd#CNTF",
    "http://example.org/amd#Carotenoids",
    "http://example.org/amd#Lutein",
    "http://example.org/amd#Zeaxanthin"
}

la.type = "org.dllearner.algorithms.el.ELLearningAlgorithm"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
