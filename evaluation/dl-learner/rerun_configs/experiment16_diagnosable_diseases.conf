/**
 * Experiment 16: Diseases that are diagnosable vs those without diagnostic triples
 * Should find: diagnosedBy SOME DiagnosticMethod
 */
ks.type = "OWL File"
ks.fileName = "../../../ontology/AMD_final_clean.owl"
reasoner.type = "closed world reasoner"
reasoner.sources = { ks }
lp.type = "posNegStandard"

// Diseases with diagnosedBy triples
lp.positiveExamples = {
    "http://example.org/amd#AMD",
    "http://example.org/amd#WetAMD",
    "http://example.org/amd#Glaucoma",
    "http://example.org/amd#GeographicAtrophy"
}

// Diseases/entities without diagnosedBy triples
lp.negativeExamples = {
    "http://example.org/amd#Cataract",
    "http://example.org/amd#ARMD",
    "http://example.org/amd#Retinopathy",
    "http://example.org/amd#DryAMD",
    "http://example.org/amd#Endophthalmitis",
    "http://example.org/amd#Smoking",
    "http://example.org/amd#Sunlight",
    "http://example.org/amd#CFH",
    "http://example.org/amd#ARMS2"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
