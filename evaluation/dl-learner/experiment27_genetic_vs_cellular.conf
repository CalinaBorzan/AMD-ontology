/**
 * Experiment 27: Genetic biomarkers vs cellular/anatomical biomarkers.
 *
 * All examples live in the Biomarker class, so class membership
 * cannot separate them. DL-Learner must find that genetic markers
 * carry an associatedWith link to a Disease (CFH associatedWith
 * AMD, etc.), whereas cellular/anatomical biomarkers are connected
 * through different paths (or no associatedWith link at all).
 *
 * If the heuristic finds nothing meaningful beyond "Biomarker",
 * this is evidence that the agentic ontology lacks the structural
 * detail to separate these two semantic groups, and that further
 * enrichment passes are required.
 */

ks.type = "OWL File"
ks.fileName = "../../../ontology/AMD_final_clean.owl"

reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

lp.type = "posNegStandard"

// Genetic biomarkers (variants, complement genes)
lp.positiveExamples = {
    "http://example.org/amd#CFH",
    "http://example.org/amd#C3",
    "http://example.org/amd#ARMS2",
    "http://example.org/amd#HTRA1",
    "http://example.org/amd#rs11200638",
    "http://example.org/amd#rs1061170"
}

// Cellular / anatomical / structural biomarkers (also in Biomarker)
lp.negativeExamples = {
    "http://example.org/amd#Monocytes",
    "http://example.org/amd#Fibroblasts",
    "http://example.org/amd#Microglia",
    "http://example.org/amd#Photoreceptor",
    "http://example.org/amd#Plasma",
    "http://example.org/amd#Lipofuscin",
    "http://example.org/amd#Drusen"
}

la.type = "celoe"
la.maxExecutionTimeInSeconds = 60
la.noisePercentage = 15.0
