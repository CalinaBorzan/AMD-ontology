// ============================================================
// DL-Learner: Mechanistic vs. Pure Intervention AMD Studies
// ============================================================
// QUESTION: What OWL class expression characterises AMD abstracts
// that involve BOTH a treatment AND a biomarker/diagnostic method,
// as opposed to those that only mention treatments?
//
// Positives (42): treatment + biomarker OR diagnostic method
// Negatives (25): treatment only, no biomarker/diagnostic
//
// Restricted to the 6 enriched abstract-level properties so
// DL-Learner focuses on meaningful medical features only.
// ============================================================

prefixes = [ ("amd","http://example.org/amd#") ]

ks.type = "OWL File"
ks.fileName = "AMD.owl"

reasoner.type = "closed world reasoner"
reasoner.sources = { ks }

