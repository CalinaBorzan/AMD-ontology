alg.type = "celoe"

// Give it 10 minutes instead of 3
alg.maxExecutionTimeInSeconds = 600

// Return top 10 solutions
alg.maxNrOfResults = 10

// Only use the 6 enriched abstract-level properties.
// This prevents DL-Learner from wandering into schema-level
// properties like "treats", "inhibits", "isSubtypeOf" etc.
// which are not meaningful at the abstract level.
alg.allowedObjectProperties = {
  "amd:involvesTreatment",
  "amd:involvesBiomarker",
  "amd:involvesDiagnosticMethod",
  "amd:involvesGene",
  "amd:involvesOutcome",
  "amd:involvesRiskFactor"
}
